map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    root /app/frontend;
    index index.html;
    client_max_body_size 60m;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # --- Long-lived cache for Vite's hashed assets (JS/CSS/fonts/images) ---
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- API and websocket routes: proxy to the backend ---
    location ~ ^/(auth|build|preview|compile|user|repos|health|monitoring|workspace|team-sessions|terminal|collaboration|assets/mathjax) {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Build runs take up to 30 min — extend timeouts accordingly
        proxy_read_timeout    1800s;
        proxy_send_timeout    1800s;
        proxy_connect_timeout 60s;

        # Stream build logs without buffering
        proxy_buffering       off;
        proxy_request_buffering off;
    }

    # --- React SPA: all other paths return index.html ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
