map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ── HTTP: ACME challenge passthrough + redirect everything else to HTTPS ──
server {
    listen 80;
    server_name proofdesk.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──
server {
    listen 443 ssl;
    http2 on;
    server_name proofdesk.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/proofdesk.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proofdesk.duckdns.org/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /app/frontend;
    index index.html;
    client_max_body_size 60m;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # --- Backend routes that serve .css/.js files — must come before static catch-all ---
    location ^~ /preview {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout    5400s;
        proxy_send_timeout    5400s;
        proxy_connect_timeout 60s;
        proxy_buffering       off;
        proxy_request_buffering off;
    }

    location ^~ /assets/mathjax {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_valid 200 7d;
        access_log off;
    }

    # --- Long-lived cache for Vite's hashed assets (JS/CSS/fonts/images) ---
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- API and websocket routes: proxy to the backend ---
    location ~ ^/(auth|build|preview|compile|user|repos|health|monitoring|workspace/|team-sessions|terminal|collaboration|assets/mathjax|demo$) {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Build runs can take 60-90 min on small instances
        proxy_read_timeout    5400s;
        proxy_send_timeout    5400s;
        proxy_connect_timeout 60s;

        # Stream build logs without buffering
        proxy_buffering       off;
        proxy_request_buffering off;
    }

    # --- React SPA: all other paths return index.html ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
